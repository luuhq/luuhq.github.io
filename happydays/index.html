<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Happy Days v3</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css" integrity="sha384-PsH8R72JQ3SOdhVi3uxftmaW6Vc51MKb0q5P2rRUpPvrszuE4W1povHYgTpBfshb" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="1800">
    <style>
      body {
        background-color: #f8f9fa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      .forecast-ctr {
        text-align: center;
        vertical-align: middle !important;
      }
      .forecast-small {
        font-size: 0.85rem;
        font-weight: 500;
        margin-top: 5px;
      }
      .forecast-xsmall {
        font-size: 0.75rem;
        color: #6c757d;
      }
      .weather-icon {
        font-size: 2.2rem;
      }
      .loading-text {
        text-align: center;
        padding: 20px;
        font-style: italic;
        color: #666;
      }
      .table {
        background-color: white;
      }
      /* Ensure date text aligns to the top-left */
      .date-col {
        vertical-align: top !important; 
        text-align: left !important;
        padding-top: 10px !important;
        padding-left: 10px !important;
        border-right: 2px solid #dee2e6; 
      }
      
      /* --- NEW: Sticky Header CSS --- */
      #forecastView thead th {
        position: sticky;
        top: 0;
        background-color: #e9ecef; /* Matches Bootstrap's .thead-light */
        z-index: 10; /* Keeps it above the scrolling rows below */
        box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.2); /* Adds a subtle shadow when scrolling */
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <a class="navbar-brand" href="#">Happy Days Forecast</a>
    </nav>

    <div class="container-fluid mt-3">
      <div id="loadingStatus" class="loading-text">Initializing weather data...</div>

      <div class="table-responsive" style="max-height: 85vh; overflow-y: auto;">
        <table id="forecastView" class="table table-striped table-bordered table-sm">
          </table>
      </div>
    </div>

    <script>
      class Location {
          constructor(name, lat, lon) {
              this.name = name;
              this.lat = lat;
              this.lon = lon;
          }
      }
      
      const LOCATIONS = [
        new Location('Deming, WA', 48.83000183, -122.20999908),
        new Location('Ashford, WA', 46.763149, -121.989616),
        new Location('Gold Bar, WA', 47.86000061, -121.69999695),
        new Location('North Bend, WA', 47.502934, -121.768562),
        new Location('La Push, WA', 47.90999985, -124.63999939),
        new Location('Forks, WA', 47.936375, -124.569603),
        new Location('Sandy, OR', 45.40000153, -122.26000214),
        new Location('Government Camp, OR', 45.318356, -121.911232),
        new Location('Pacific City, OR', 45.207233, -123.958923),
      ];

      let weatherForecastData = [];

      function parseWmoCode(code, hourOfDay) {
        const isDay = hourOfDay >= 6 && hourOfDay <= 18;
        let phrase = "Unknown";
        let icon = "bi-question-circle";
        let color = "#343a40"; 
        
        switch (code) {
          case 0: 
            phrase = "Clear"; 
            if (isDay) { icon = "bi-sun-fill"; color = "#ffc107"; } 
            else { icon = "bi-moon-stars-fill"; color = "#e2e6ea"; } 
            break;
          case 1: 
            phrase = "Mainly Clear"; 
            if (isDay) { icon = "bi-cloud-sun-fill"; color = "#fd7e14"; } 
            else { icon = "bi-cloud-moon-fill"; color = "#6c757d"; } 
            break;
          case 2: 
            phrase = "Partly Cloudy"; 
            icon = "bi-cloud-fill"; 
            color = "#adb5bd"; 
            break;
          case 3: 
            phrase = "Overcast"; 
            icon = "bi-clouds-fill"; 
            color = "#6c757d"; 
            break;
          case 45: case 48: 
            phrase = "Fog"; 
            icon = "bi-cloud-haze2-fill"; 
            color = "#adb5bd"; 
            break;
          case 51: case 53: case 55: 
            phrase = "Drizzle"; 
            icon = "bi-cloud-drizzle-fill"; 
            color = "#0dcaf0"; 
            break;
          case 56: case 57: 
            phrase = "Freezing Drizzle"; 
            icon = "bi-cloud-sleet-fill"; 
            color = "#0dcaf0"; 
            break;
          case 61: 
            phrase = "Light Rain"; 
            icon = "bi-cloud-rain-fill"; 
            color = "#0d6efd"; 
            break;
          case 63: case 65: 
            phrase = "Rain"; 
            icon = "bi-cloud-rain-heavy-fill"; 
            color = "#004085"; 
            break;
          case 66: case 67: 
            phrase = "Freezing Rain"; 
            icon = "bi-cloud-sleet-fill"; 
            color = "#0dcaf0"; 
            break;
          case 71: case 73: case 75: 
            phrase = "Snow"; 
            icon = "bi-cloud-snow-fill"; 
            color = "#0dcaf0"; 
            break;
          case 77: 
            phrase = "Snow Grains"; 
            icon = "bi-snow"; 
            color = "#adb5bd"; 
            break;
          case 80: case 81: case 82: 
            phrase = "Rain Showers"; 
            icon = "bi-cloud-showers-heavy-fill"; 
            color = "#004085"; 
            break;
          case 85: case 86: 
            phrase = "Snow Showers"; 
            icon = "bi-cloud-snow-fill"; 
            color = "#0dcaf0"; 
            break;
          case 95: case 96: case 99: 
            phrase = "Thunderstorm"; 
            icon = "bi-cloud-lightning-rain-fill"; 
            color = "#6f42c1"; 
            break;
        }
        return { phrase, icon, color };
      }

      function renderTable() {
        if (weatherForecastData.length === 0) return;

        let html = [];
        
        // Build Header
        html.push('<thead class="thead-light"><tr><th colspan="2" class="align-middle text-center">Date / Time</th>');
        for (let loc of LOCATIONS) {
          html.push(`<th class="forecast-ctr align-middle">${loc.name}</th>`);
        }
        html.push('</tr></thead><tbody>');

        const masterTimes = weatherForecastData[0].hourly.time;
        let daysMap = {}; 

        for (let i = 0; i < masterTimes.length; i++) {
          let dt = new Date(masterTimes[i]);
          let dateStr = dt.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
          let hourStr = dt.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
          
          if (!daysMap[dateStr]) daysMap[dateStr] = [];
          daysMap[dateStr].push({ hourStr: hourStr, index: i, hourOfDay: dt.getHours() });
        }

        for (let [dateStr, hours] of Object.entries(daysMap)) {
          html.push(`<tr><td class="date-col" rowspan="${hours.length}"><strong>${dateStr}</strong></td>`);
          
          for (let h = 0; h < hours.length; h++) {
            let hrInfo = hours[h];
            if (h > 0) html.push('<tr>');
            
            html.push(`<td class="align-middle text-right" style="white-space: nowrap;">${hrInfo.hourStr}</td>`);
            
            for (let locIdx = 0; locIdx < LOCATIONS.length; locIdx++) {
              let locData = weatherForecastData[locIdx];
              
              if (!locData || !locData.hourly) {
                html.push('<td class="forecast-ctr text-muted">Loading...</td>');
                continue;
              }
              
              let temp = Math.round(locData.hourly.temperature_2m[hrInfo.index]);
              let feelsLike = Math.round(locData.hourly.apparent_temperature[hrInfo.index]);
              let wmoCode = locData.hourly.weather_code[hrInfo.index];
              let wmoInfo = parseWmoCode(wmoCode, hrInfo.hourOfDay);
              
              html.push('<td class="forecast-ctr">');
              html.push(`<div><i class="bi ${wmoInfo.icon} weather-icon" style="color: ${wmoInfo.color};" title="${wmoInfo.phrase}"></i></div>`);
              html.push(`<div class="forecast-small">${wmoInfo.phrase}</div>`);
              html.push(`<div class="forecast-xsmall">Temp: ${temp}&#8457; / Feels: ${feelsLike}&#8457;</div>`);
              html.push('</td>');
            }
            html.push('</tr>');
          }
        }
        
        html.push('</tbody>');
        document.getElementById('forecastView').innerHTML = html.join('');
      }

      function loadWeather(locationIndex) {
        if (locationIndex >= LOCATIONS.length) {
          document.getElementById('loadingStatus').style.display = 'none';
          return;
        }

        const loc = LOCATIONS[locationIndex];
        document.getElementById('loadingStatus').innerText = `Loading data for ${loc.name}...`;

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&hourly=temperature_2m,apparent_temperature,weather_code&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles&forecast_days=10`;

        fetch(url)
          .then(response => {
            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
            return response.json();
          })
          .then(data => {
            weatherForecastData[locationIndex] = data; 
            renderTable();

            setTimeout(() => loadWeather(locationIndex + 1), 200);
          })
          .catch(error => {
            console.error(`Failed to load weather for ${loc.name}:`, error);
            weatherForecastData[locationIndex] = { error: true };
            setTimeout(() => loadWeather(locationIndex + 1), 200);
          });
      }

      loadWeather(0);
    </script>
  </body>
</html>
