<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Happy Days Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css" integrity="sha384-PsH8R72JQ3SOdhVi3uxftmaW6Vc51MKb0q5P2rRUpPvrszuE4W1povHYgTpBfshb" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="1800">
    <style>
      .forecast-ctr {
        text-align: center;
      }
      .forecast-small {
        font-size: small;
      }
      .forecast-xsmall {
        font-size: x-small;
        color: #6c757d;
      }
      .forecast-icon {
        width: 40px;
        height: 40px;
      }
      .loading-text {
        text-align: center;
        padding: 20px;
        font-style: italic;
        color: #666;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <a class="navbar-brand" href="#">Happy Days Forecast</a>
    </nav>

    <div id="loadingStatus" class="loading-text">Initializing weather data...</div>

    <table id="forecastView" class="table table-striped table-bordered mt-3">
      </table>

    <script>
      class Location {
          constructor(name, lat, lon) {
              this.name = name;
              this.lat = lat;
              this.lon = lon;
          }
      }
      
      const LOCATIONS = [
        new Location('Deming, WA', 48.83000183, -122.20999908),
        new Location('Ashford, WA', 46.763149, -121.989616),
        new Location('Gold Bar, WA', 47.86000061, -121.69999695),
        new Location('North Bend, WA', 47.502934, -121.768562),
        new Location('La Push, WA', 47.90999985, -124.63999939),
        new Location('Forks, WA', 47.936375, -124.569603),
        new Location('Sandy, OR', 45.40000153, -122.26000214),
        new Location('Government Camp, OR', 45.318356, -121.911232),
        new Location('Pacific City, OR', 45.207233, -123.958923),
      ];

      let weatherForecastData = [];

      // Maps Open-Meteo WMO weather codes to readable phrases and the legacy Weather Underground icons
      function parseWmoCode(code, hourOfDay) {
        const isDay = hourOfDay >= 6 && hourOfDay <= 18;
        let phrase = "Unknown";
        let icon = "44"; // Default N/A icon
        
        switch (code) {
          case 0: phrase = "Clear"; icon = isDay ? "32" : "31"; break;
          case 1: phrase = "Mainly Clear"; icon = isDay ? "34" : "33"; break;
          case 2: phrase = "Partly Cloudy"; icon = isDay ? "30" : "29"; break;
          case 3: phrase = "Overcast"; icon = "26"; break;
          case 45: case 48: phrase = "Fog"; icon = "20"; break;
          case 51: case 53: case 55: phrase = "Drizzle"; icon = "9"; break;
          case 56: case 57: phrase = "Freezing Drizzle"; icon = "10"; break;
          case 61: phrase = "Light Rain"; icon = "11"; break;
          case 63: phrase = "Rain"; icon = "12"; break;
          case 65: phrase = "Heavy Rain"; icon = "12"; break;
          case 66: case 67: phrase = "Freezing Rain"; icon = "10"; break;
          case 71: phrase = "Light Snow"; icon = "14"; break;
          case 73: phrase = "Snow"; icon = "16"; break;
          case 75: phrase = "Heavy Snow"; icon = "16"; break;
          case 77: phrase = "Snow Grains"; icon = "14"; break;
          case 80: case 81: case 82: phrase = "Rain Showers"; icon = "11"; break;
          case 85: case 86: phrase = "Snow Showers"; icon = "14"; break;
          case 95: phrase = "Thunderstorm"; icon = "4"; break;
          case 96: case 99: phrase = "Thunderstorm w/ Hail"; icon = "4"; break;
        }
        return { phrase, icon };
      }

      function renderTable() {
        if (weatherForecastData.length === 0) return;

        let html = [];
        
        // Build Header
        html.push('<thead class="thead-light"><tr><th colspan="2">Date / Time</th>');
        for (let loc of LOCATIONS) {
          html.push(`<th class="forecast-ctr" valign="middle">${loc.name}</th>`);
        }
        html.push('</tr></thead><tbody>');

        // We use the first location's time array as our master timeline
        const masterTimes = weatherForecastData[0].hourly.time;
        let daysMap = {}; 

        // Group the hours by Date
        for (let i = 0; i < masterTimes.length; i++) {
          let dt = new Date(masterTimes[i]);
          let dateStr = dt.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
          let hourStr = dt.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
          
          if (!daysMap[dateStr]) daysMap[dateStr] = [];
          daysMap[dateStr].push({ hourStr: hourStr, index: i, hourOfDay: dt.getHours() });
        }

        // Build Table Rows
        for (let [dateStr, hours] of Object.entries(daysMap)) {
          html.push(`<tr><td valign="middle" rowspan="${hours.length}"><strong>${dateStr}</strong></td>`);
          
          for (let h = 0; h < hours.length; h++) {
            let hrInfo = hours[h];
            if (h > 0) html.push('<tr>');
            
            html.push(`<td valign="middle" style="white-space: nowrap;">${hrInfo.hourStr}</td>`);
            
            // Populate columns for each location
            for (let locIdx = 0; locIdx < LOCATIONS.length; locIdx++) {
              let locData = weatherForecastData[locIdx];
              
              if (!locData || !locData.hourly) {
                html.push('<td class="forecast-ctr text-muted">Loading...</td>');
                continue;
              }
              
              let temp = Math.round(locData.hourly.temperature_2m[hrInfo.index]);
              let feelsLike = Math.round(locData.hourly.apparent_temperature[hrInfo.index]);
              let wmoCode = locData.hourly.weather_code[hrInfo.index];
              let wmoInfo = parseWmoCode(wmoCode, hrInfo.hourOfDay);
              
              html.push('<td class="forecast-ctr">');
              html.push(`<div><img class="forecast-icon" border="0" src="https://icons.wxug.com/i/c/v4/${wmoInfo.icon}.svg" alt="${wmoInfo.phrase}" /></div>`);
              html.push(`<div class="forecast-small">${wmoInfo.phrase}</div>`);
              html.push(`<div class="forecast-xsmall">Temp: ${temp}&#8457; / Feels: ${feelsLike}&#8457;</div>`);
              html.push('</td>');
            }
            html.push('</tr>');
          }
        }
        
        html.push('</tbody>');
        document.getElementById('forecastView').innerHTML = html.join('');
      }

      function loadWeather(locationIndex) {
        if (locationIndex >= LOCATIONS.length) {
          document.getElementById('loadingStatus').style.display = 'none';
          return;
        }

        const loc = LOCATIONS[locationIndex];
        document.getElementById('loadingStatus').innerText = `Loading data for ${loc.name}...`;

        // Open-Meteo API URL (10 days, hourly temp/feels-like/weather-code, Pacific Timezone)
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&hourly=temperature_2m,apparent_temperature,weather_code&temperature_unit=fahrenheit&timezone=America%2FLos_Angeles&forecast_days=10`;

        fetch(url)
          .then(response => {
            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
            return response.json();
          })
          .then(data => {
            weatherForecastData[locationIndex] = data; 
            renderTable(); // Re-render table as each location loads

            // Cascade the next fetch after a small delay to be polite to the API
            setTimeout(() => loadWeather(locationIndex + 1), 300);
          })
          .catch(error => {
            console.error(`Failed to load weather for ${loc.name}:`, error);
            weatherForecastData[locationIndex] = { error: true }; // Prevent alignment errors
            setTimeout(() => loadWeather(locationIndex + 1), 300);
          });
      }

      // Start the cascade
      loadWeather(0);
    </script>
  </body>
</html>
